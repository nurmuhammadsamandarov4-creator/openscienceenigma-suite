<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Задание</title>
  <style>
    body{ margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; background:#f4f6fb; }
    .wrap{ max-width:1100px; margin:0 auto; padding:28px 16px; }
    .card{ background:#fff; border-radius:18px; padding:18px; box-shadow: 0 12px 30px rgba(16,24,40,.08); margin-top:14px; }
    .muted{ color:#667085; font-size:14px; }
    .btn{ background:#56b7ff; color:#fff; border:none; border-radius:12px; padding:10px 14px; cursor:pointer; font-size:16px; }
    .btn2{ background:#512da8; }
    textarea{ width:100%; min-height:140px; padding:12px; border-radius:12px; border:1px solid #cbd5e1; }
    a{ color:#1d9bf0; text-decoration:none; }
    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
    @media (max-width: 900px){ .grid{ grid-template-columns:1fr; } }
    table{ width:100%; border-collapse:collapse; }
    th,td{ text-align:left; padding:10px; border-bottom:1px solid #eef2f7; font-size:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
      <div>
        <h1 style="margin:0;">Задание</h1>
        <div class="muted"><a href="/public/tasks.html">← Все задания</a> • <a href="/public/dashboard.html">Dashboard</a></div>
      </div>
      <a class="btn btn2" href="/public/create-task.html" style="text-decoration:none;">+ Создать</a>
    </div>

    <div class="card" id="taskBox"></div>

    <div class="grid">
      <div class="card">
        <h2 style="margin-top:0;">Отправить результат</h2>
        <p class="muted">Чтобы отправить файл/ответ владельцу задания, нужно быть залогиненным.</p>
        <textarea id="message" placeholder="Ваше сообщение (необязательно)"></textarea>
        <input id="files" type="file" multiple />
        <div style="margin-top:10px;">
          <button class="btn" id="sendBtn">Отправить</button>
        </div>
        <div class="muted" id="sendMsg"></div>
      </div>

      <div class="card">
        <h2 style="margin-top:0;">Ответы (для владельца)</h2>
        <p class="muted">Владелец задания видит все ответы здесь.</p>
        <div id="subsBox" class="muted">Loading...</div>
      </div>
    </div>
  </div>
  <script src="/public/i18n.js?v=20260615_v6"></script>
  <script src="/public/lang-ui.js?v=20260615_v6"></script>


  <script src="/auth-ui.js"></script>
  <script src="/task.js"></script>
</body>
</html>
