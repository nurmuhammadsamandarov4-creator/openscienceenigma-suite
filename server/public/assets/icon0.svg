<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="url(#shine)"/>

  <!-- Atom orbits -->
  <ellipse cx="256" cy="256" rx="160" ry="56" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="12"/>
  <ellipse cx="256" cy="256" rx="160" ry="56" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="12" transform="rotate(60 256 256)"/>
  <ellipse cx="256" cy="256" rx="160" ry="56" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="12" transform="rotate(120 256 256)"/>

  <!-- Center nucleus -->
  <circle cx="256" cy="256" r="36" fill="white"/>

  <!-- Electron dots -->
  <circle cx="416" cy="256" r="16" fill="white" opacity="0.9"/>
  <circle cx="175" cy="116" r="16" fill="white" opacity="0.9"/>
  <circle cx="175" cy="396" r="16" fill="white" opacity="0.9"/>
</svg>
