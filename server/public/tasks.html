<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Buildify — Открытые задания</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #ffffff;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-color: #f1f5f9;
      --border-focus: #e2e8f0;
      --primary-color: #f97316; /* brand orange accent */
      --primary-hover: #ea580c;
      --primary-glow: rgba(249, 115, 22, 0.08);
      --font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-family);
      line-height: 1.5;
      padding: 0;
      margin: 0;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* Elegant Top Navbar Area */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-main);
    }

    .btn-group {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-sm);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: var(--primary-color);
      color: #ffffff;
      border: none;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-main);
      border: 1px solid var(--border-focus);
    }

    .btn-outline:hover {
      background: #fafafa;
      border-color: var(--text-muted);
    }

    /* Cards System */
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--border-color);
      padding: 24px;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.04);
      margin-bottom: 24px;
    }

    /* List item styles */
    .item {
      border-bottom: 1px solid var(--border-color);
      padding: 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      transition: all 0.2s ease;
    }

    .item:first-child {
      padding-top: 0;
    }

    .item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    @media (max-width: 600px) {
      .item {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }

    .item-content {
      flex: 1;
    }

    .item-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .item-meta {
      font-size: 13px;
      color: var(--text-muted);
    }

    .loading-notice {
      text-align: center;
      color: var(--text-muted);
      font-style: italic;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Top Navbar Area -->
    <div class="top admin-header">
      <h1>Открытые задания</h1>
      <div class="btn-group">
        <a class="btn btn-primary" href="/public/create-task.html" data-i18n="tasks_create">+ Создать задание</a>
        <a class="btn btn-outline" href="/public/dashboard.html" data-i18n="tasks_dashboard">Dashboard</a>
      </div>
    </div>

    <div class="card" id="list">
      <div class="loading-notice" id="msg">Loading...</div>
    </div>
  </div>
  
  <script src="/public/i18n.js?v=20260615_v6"></script>
  <script src="/public/lang-ui.js?v=20260615_v6"></script>
  <script src="/auth-ui.js"></script>
  <script src="/tasks.js"></script>
</body>
</html>
