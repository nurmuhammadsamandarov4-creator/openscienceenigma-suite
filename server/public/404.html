<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Sahifa topilmadi</title>
  <link rel="icon" href="/assets/favicon.ico" />

  <!-- Optional: if Tailwind output exists, it will enhance the look. -->
  <link rel="stylesheet" href="/output.css" />

  <!--
    Fallback CSS (so the page still looks like TailAdmin even if /output.css is missing).
  -->
  <style>
    :root {
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --brand: #465fff; /* TailAdmin-like blue */
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
        "Apple Color Emoji", "Segoe UI Emoji";
    }

    .page {
      position: relative;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .grid-shape {
      position: absolute;
      width: 100%;
      max-width: 450px;
      pointer-events: none;
      opacity: 0.9;
    }
    .grid-top-right { top: 0; right: 0; }
    .grid-bottom-left { bottom: 0; left: 0; transform: rotate(180deg); }

    .content {
      width: 100%;
      max-width: 472px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .title {
      margin: 0 0 28px;
      font-weight: 800;
      letter-spacing: 0.08em;
      font-size: 44px;
      line-height: 1.05;
    }

    .hero {
      display: block;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
    }

    .desc {
      margin: 24px 0 18px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      background: var(--card-bg);
      color: #374151;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      transition: background 0.15s ease, transform 0.05s ease;
    }
    .btn:hover { background: #f9fafb; }
    .btn:active { transform: translateY(1px); }

    .footer {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      font-size: 14px;
      color: #9ca3af;
      text-align: center;
      width: 100%;
      padding: 0 16px;
    }

    .card {
      border-radius: 18px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 44px 28px;
    }

    @media (max-width: 520px) {
      .title { font-size: 36px; }
      .desc { font-size: 16px; }
      .card { padding: 34px 18px; }
      .grid-shape { max-width: 260px; opacity: 0.8; }
    }
  </style>
</head>

<body>
  <main class="page">
    <!-- TailAdmin-like grid background shapes -->
    <img class="grid-shape grid-top-right" src="/images/shape/grid-01.svg" alt="" aria-hidden="true" />
    <img class="grid-shape grid-bottom-left" src="/images/shape/grid-01.svg" alt="" aria-hidden="true" />

    <div class="content">
      <section class="card">
        <h1 class="title">ERROR</h1>

        <img class="hero" src="/images/error/404.svg" alt="404" />

        <p class="desc">Siz izlagan sahifani topa olmadik. Linkni tekshirib qayta urinib ko‘ring.</p>

        <a class="btn" href="/">Bosh sahifaga qaytish</a>
      </section>
    </div>

    <div class="footer">&copy; 2026 - OpenScienceEnigma</div>
  </main>
</body>
</html>
