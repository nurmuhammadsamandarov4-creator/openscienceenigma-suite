<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Science Enigma</title>
  <!-- GSAP Animation Library -->
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
  <style>
    :root {
      --bg-color: #f8fafc;
      --text-primary: #0f172a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-color);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    /* Ambient noise overlay */
    .grain {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 3;
    }

    /* Vignette mask */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 40%, #f8fafc 98%);
      pointer-events: none;
      z-index: 2;
    }

    /* Cinematic background wrapper */
    .wrap {
      height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 4;
    }

    /* Loader Container */
    .loader-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .minimal-spinner {
      position: relative;
      width: 90px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Central solid circle */
    .center-circle {
      width: 24px;
      height: 24px;
      background: #0f172a;
      border-radius: 50%;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
      z-index: 2;
    }

    /* Inner rotating thin line */
    .spin-ring-inner {
      position: absolute;
      width: 54px;
      height: 54px;
      border: 2px solid transparent;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin-clockwise 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    /* Outer rotating dual line */
    .spin-ring-outer {
      position: absolute;
      width: 78px;
      height: 78px;
      border: 1.5px solid transparent;
      border-left-color: #f97316;
      border-right-color: #10b981;
      border-radius: 50%;
      animation: spin-counterclockwise 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes spin-clockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes spin-counterclockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }
  </style>
</head>

<body>
  <div class="grain"></div>
  <div class="vignette"></div>

  <div class="wrap">
    <div class="loader-container" id="loader-el">
      <div class="minimal-spinner">
        <div class="center-circle"></div>
        <div class="spin-ring-inner"></div>
        <div class="spin-ring-outer"></div>
      </div>
    </div>
  </div>

  <script>
    const REDIRECT_TO = "/";

    function go() {
      gsap.to("body", {
        opacity: 0,
        duration: 0.4,
        onComplete: () => {
          window.location.replace(REDIRECT_TO);
        }
      });
    }

    window.addEventListener("DOMContentLoaded", () => {
      // Fade-in the page
      gsap.fromTo("body", { opacity: 0 }, { opacity: 1, duration: 0.5 });
      
      // Let the spinner animate for 2.2 seconds, then fade out and redirect
      setTimeout(go, 2200);
    });
  </script>
</body>

</html>
